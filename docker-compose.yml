version: '3.8'

services:
  beatmaps:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beatmaps-app
    ports:
      - "3000:80"
    environment:
      # Optional: Pass environment variables if needed at runtime
      # Note: Spotify Client ID should be configured in the app settings UI
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

# Optional: Add a reverse proxy service if you want HTTPS
